<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4F8EF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GuideAI">
<meta name="description" content="AI-powered Career & Education Guidance">
<link rel="manifest" href="./manifest.json">
<title>GuideAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --bg: #0B0F1A;
    --surface: #131929;
    --card: #1A2237;
    --border: #243050;
    --accent: #4F8EF7;
    --accent2: #7C5CFC;
    --green: #2ECC9A;
    --text: #E8EDF5;
    --muted: #7A8BA8;
    --user-bubble: #1E3A6E;
    --ai-bubble: #1A2237;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }

  /* AUTH SCREEN */
  .auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 24px;
    background: var(--bg);
  }

  .auth-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
  }

  .auth-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-style: italic;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .auth-subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 36px;
    text-align: center;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .auth-tabs {
    display: flex;
    background: var(--card);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 20px;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: 'Space Grotesk', sans-serif;
  }

  .auth-tab.active {
    background: var(--accent);
    color: white;
  }

  .auth-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .auth-input:focus { border-color: var(--accent); }
  .auth-input::placeholder { color: var(--muted); }

  .auth-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
  }

  .auth-btn:active { opacity: 0.8; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    color: var(--muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .google-btn {
    width: 100%;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.2s;
  }

  .google-btn:hover { border-color: var(--accent); }

  .auth-error {
    color: #ff6b6b;
    font-size: 12px;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
  }

  /* MAIN APP */
  .main-app { display: none; flex-direction: column; height: 100%; }
  .main-app.show { display: flex; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 8px; }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    font-style: italic;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .lang-pill {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .lang-btn {
    background: none; border: none;
    color: var(--muted);
    padding: 4px 9px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }

  .lang-btn.active { background: var(--accent); color: white; }

  .user-avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
  }

  .logout-menu {
    display: none;
    position: absolute;
    top: 36px; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    z-index: 100;
    min-width: 120px;
  }

  .logout-menu.show { display: block; }

  .logout-btn {
    width: 100%;
    padding: 8px 12px;
    background: none;
    border: none;
    color: #ff6b6b;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    border-radius: 6px;
  }

  .logout-btn:hover { background: var(--card); }

  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 12px;
  }

  .welcome { padding: 28px 4px 20px; text-align: center; }

  .welcome h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px; font-style: italic;
    line-height: 1.25; margin-bottom: 8px;
  }

  .welcome h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p { color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }

  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 18px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
  }

  .chip:active { border-color: var(--accent); color: var(--accent); }

  .messages { display: flex; flex-direction: column; gap: 12px; padding: 8px 0 12px; }

  .msg { display: flex; gap: 8px; align-items: flex-start; animation: fadeUp 0.25s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }

  .avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .avatar.user { background: var(--user-bubble); border: 1px solid var(--border); }

  .bubble {
    max-width: 78%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.6;
  }

  .msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 3px; }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid #2A4A80; border-top-right-radius: 3px; }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 10px 4px; }

  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
  }

  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 10px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; resize: none; max-height: 100px; line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .send-btn:active { opacity: 0.75; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; fill: white; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-logo">🎯</div>
  <div class="auth-title">GuideAI</div>
  <div class="auth-subtitle">Career & Education ka AI Advisor<br>Duniya ka sabse smart guide</div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <input type="email" class="auth-input" id="authEmail" placeholder="Email address">
    <input type="password" class="auth-input" id="authPassword" placeholder="Password">
    <input type="text" class="auth-input" id="authName" placeholder="Aapka naam" style="display:none">

    <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Login</button>

    <div class="divider">ya</div>

    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google se Login
    </button>

    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="main-app" id="mainApp">
  <header>
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <div class="logo-text">GuideAI</div>
    </div>
    <div class="header-right">
      <div class="lang-pill">
        <button class="lang-btn active" onclick="setLang('hi',this)">हि</button>
        <button class="lang-btn" onclick="setLang('en',this)">EN</button>
        <button class="lang-btn" onclick="setLang('ar',this)">ع</button>
        <button class="lang-btn" onclick="setLang('es',this)">ES</button>
      </div>
      <div class="user-avatar" id="userAvatar" onclick="toggleLogout()">?</div>
      <div class="logout-menu" id="logoutMenu">
        <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
      </div>
    </div>
  </header>

  <div class="messages-wrap" id="messagesWrap">
    <div class="welcome" id="welcome">
      <h1>Apna <span>Career</span> &<br><span>Education</span> Sawal Poochho</h1>
      <p>AI aapki problem samjhega aur<br>personalized solution dega 🌍</p>
      <div class="suggestions">
        <button class="chip" onclick="sendChip(this)">🎓 Kaun sa course karun?</button>
        <button class="chip" onclick="sendChip(this)">💼 Software engineer kaise banun?</button>
        <button class="chip" onclick="sendChip(this)">📊 Data Science ya AI?</button>
        <button class="chip" onclick="sendChip(this)">🌍 Abroad padhai ke liye kya karun?</button>
        <button class="chip" onclick="sendChip(this)">💰 High salary jobs kaunsi hain?</button>
        <button class="chip" onclick="sendChip(this)">📝 Resume kaise banayein?</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Apna sawal likho..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAJ40lZE1NwYRKFrqjeOmdzCtAb7QtuwNE",
    authDomain: "gudieai.firebaseapp.com",
    projectId: "gudieai",
    storageBucket: "gudieai.firebasestorage.app",
    messagingSenderId: "777139191972",
    appId: "1:777139191972:web:dd14984ecf276485d76631",
    measurementId: "G-E0KDSHQTCS"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Auth state listener
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('mainApp').classList.add('show');
      const initial = (user.displayName || user.email || '?')[0].toUpperCase();
      document.getElementById('userAvatar').textContent = initial;
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('mainApp').classList.remove('show');
    }
  });

  window.handleAuth = async () => {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authError');
    errEl.textContent = '';

    try {
      if (window.currentTab === 'signup') {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
    } catch (e) {
      errEl.textContent = e.code === 'auth/invalid-credential' ? 'Email ya password galat hai' :
        e.code === 'auth/email-already-in-use' ? 'Email pehle se registered hai' :
        e.code === 'auth/weak-password' ? 'Password kam se kam 6 characters ka hona chahiye' :
        'Kuch galat hua, dobara try karein';
    }
  };

  window.handleGoogleLogin = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      document.getElementById('authError').textContent = 'Google login mein problem aayi';
    }
  };

  window.handleLogout = async () => {
    await signOut(auth);
    document.getElementById('logoutMenu').classList.remove('show');
  };
</script>

<script>
  // PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  let currentTab = 'login';
  window.currentTab = 'login';

  function switchTab(tab) {
    window.currentTab = tab;
    currentTab = tab;
    document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('authSubmitBtn').textContent = tab === 'login' ? 'Login' : 'Account Banao';
    document.getElementById('authName').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('authError').textContent = '';
  }

  function toggleLogout() {
    document.getElementById('logoutMenu').classList.toggle('show');
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.user-avatar') && !e.target.closest('.logout-menu')) {
      document.getElementById('logoutMenu').classList.remove('show');
    }
  });

  // Chat
  let currentLang = 'hi';
  let isLoading = false;
  let history = [];

  const systemPrompts = {
    hi: `Aap GuideAI hain — ek world-class AI career aur education advisor. Hamesha Hindi mein jawab dein. Friendly, warm tone rakhein. Practical steps batayein. Emojis use karein. Follow-up questions poochein.`,
    en: `You are GuideAI — a world-class AI career and education advisor. Always respond in English. Be friendly and encouraging. Give practical steps. Use emojis.`,
    ar: `أنت GuideAI — مستشار ذكاء اصطناعي للتعليم والمهنة. أجب دائمًا باللغة العربية. كن ودودًا. قدم خطوات عملية.`,
    es: `Eres GuideAI — asesor experto en carrera y educación. Responde siempre en español. Sé amigable. Da pasos prácticos.`
  };

  function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendChip(el) {
    document.getElementById('userInput').value = el.textContent.trim();
    sendMessage();
  }

  function addMessage(role, content) {
    document.getElementById('welcome').style.display = 'none';
    const msgs = document.getElementById('messages');
    const wrap = document.getElementById('messagesWrap');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '🎯' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = content.replace(/\n/g, '<br>');
    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    setTimeout(() => wrap.scrollTop = wrap.scrollHeight, 50);
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai'; avatar.textContent = '🎯';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    div.appendChild(avatar); div.appendChild(bubble);
    msgs.appendChild(div);
    setTimeout(() => document.getElementById('messagesWrap').scrollTop = 99999, 50);
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompts[currentLang],
          messages: history
        })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.content?.[0]?.text || 'Kuch galat ho gaya.';
      history.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    } catch {
      removeTyping();
      addMessage('ai', '⚠️ Connection problem. Please try again.');
    }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
</script>
</body>
</html>
